<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedades de texto</title>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body>
    <h1 class="TituloPrincipal textoCentro subtitulo negrita">Propiedades de texto - CSS</h1>
    <header>
        <main class="container">
            <p class="textoIzquierda">esto es un texto alineado a la izquierda</p>
            <h2 class="textoCentro">esto es un texto al centro</h2>
            <h3 class="textoDerecha">esto es un texto alineado a la derecha</h3>
            <hr>
            <h2 class="textoIzquierda subtitulo1">Ejemplos decoracion</h2>
            <p>ejemplo 1: <span class="tachado">elemento tachado</span></p>
            <p>ejemplo 2: esto es un <a href="#" class="sinDecoracion">Link</a></p>
            <p>ejemplo 3: <span class="subtitulo1">Subrayado y cursiva</span></p>
            <p>ejemplo 4: <span class="negrita">Negrita</span></p>
            <p>ejemplo 5: <span class="seminegrita">Fuente mas delgada</span></p>
        </main>
    </header>
    <script src="static/js/script.js"></script>
</body>

</html>
